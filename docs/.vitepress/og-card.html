<!--
  Source for docs/public/og.png (the social link preview card).
  Render at 1200x630 and export as PNG, e.g.:
    npx -y playwright@latest screenshot --viewport-size=1200,630 \
      docs/.vitepress/og-card.html docs/public/og.png
-->
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 72px 80px;
    background: #101014;
    background-image:
      radial-gradient(900px 500px at 100% 0%, rgba(255, 117, 24, 0.20), transparent 60%),
      radial-gradient(700px 400px at 0% 100%, rgba(255, 138, 61, 0.10), transparent 60%);
    color: #f6f6f7;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }
  .package {
    font-family: 'JetBrains Mono', 'Cascadia Mono', 'Consolas', monospace;
    font-size: 30px;
    letter-spacing: -0.01em;
    color: #ff8a3d;
  }
  h1 {
    margin-top: 28px;
    font-size: 76px;
    line-height: 1.08;
    letter-spacing: -0.035em;
    font-weight: 700;
    background: linear-gradient(120deg, #ff7a18 25%, #ffb347);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p {
    margin-top: 24px;
    max-width: 1000px;
    font-size: 32px;
    line-height: 1.4;
    color: #b8b8bd;
  }
  .chips { display: flex; gap: 14px; }
  .chip {
    padding: 10px 22px;
    border-radius: 999px;
    border: 1px solid #2e2e32;
    background: #18181c;
    font-family: 'JetBrains Mono', 'Cascadia Mono', 'Consolas', monospace;
    font-size: 24px;
    color: #c9c9ce;
  }
  .foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .url {
    font-family: 'JetBrains Mono', 'Cascadia Mono', 'Consolas', monospace;
    font-size: 24px;
    color: #7c7c85;
  }
</style>

<div>
  <div class="package">@effector/router</div>
  <h1>A route is a<br />unit of logic</h1>
  <p>Model navigation as state and events — then render it anywhere.</p>
</div>

<div class="foot">
  <div class="chips">
    <span class="chip">Type-safe</span>
    <span class="chip">Framework-agnostic</span>
    <span class="chip">Observable</span>
  </div>
  <div class="url">router.effector.dev</div>
</div>
