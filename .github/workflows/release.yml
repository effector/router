name: Release version on npm

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write # OIDC trusted publishing to npm (no NPM_TOKEN needed)
  pull-requests: write # create/update the "Version Packages" PR
  contents: write # push git tags and create GitHub Releases

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Building libraries
        run: pnpm build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Running tests workflow
        run: pnpm run test

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          # Generate a GitHub Release per published package tag, using the
          # changelog-github entries as the release notes.
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
