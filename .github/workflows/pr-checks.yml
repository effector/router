name: PR Checks

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  changeset:
    name: Changeset present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changeset status compares against the base branch

      - name: Setup environment
        uses: ./.github/actions/setup

      # Fails if the PR has no changeset. For intentional no-release changes
      # (tests, CI, docs) add an empty changeset: `pnpm changeset --empty`.
      - name: Verify a changeset exists
        run: pnpm changeset status --since=origin/main

  build:
    uses: ./.github/workflows/build.yml

  typecheck:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup environment
        uses: ./.github/actions/setup

      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./packages

      - run: pnpm run typecheck

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup environment
        uses: ./.github/actions/setup

      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./packages

      - run: pnpm run lint

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup environment
        uses: ./.github/actions/setup

      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./packages

      - run: pnpm run test
