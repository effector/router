name: PR Checks

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  changeset:
    name: Changeset present
    # The "Version Packages" PR opened by changesets/action consumes all
    # changeset files, so it never has one — skip the check there.
    if: github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changeset status compares against the base branch

      - name: Setup environment
        uses: ./.github/actions/setup

      # Fails if the PR has no changeset. For intentional no-release changes
      # (tests, CI, docs) add an empty changeset: `pnpm changeset --empty`.
      - name: Verify a changeset exists
        run: pnpm changeset status --since=origin/main

  build:
    uses: ./.github/workflows/build.yml

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup environment
        uses: ./.github/actions/setup

      # The root tsconfig resolves workspace packages from source, so the type
      # gate must pass without a prior build. This also guards F1 against
      # regressing back to a dist-coupled setup.
      - run: pnpm run verify:typecheck-standalone

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup environment
        uses: ./.github/actions/setup

      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./packages

      - run: pnpm run lint

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup environment
        uses: ./.github/actions/setup

      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./packages

      - run: pnpm run test

  solid-e2e:
    name: Solid router integration
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./packages

      - name: Install Chromium
        run: pnpm --filter @effector/router-solid-example exec playwright install --with-deps chromium

      - name: Build Solid example
        run: pnpm --filter @effector/router-solid-example build

      - name: Typecheck Solid example
        run: pnpm --filter @effector/router-solid-example typecheck

      - name: Run Solid browser tests
        run: pnpm --filter @effector/router-solid-example test:e2e
