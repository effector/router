name: 🐛 Bug report
description: Report something that isn't working as expected.
title: '[Bug]: '
type: 'Bug'
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report! Please fill out the sections below.
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - '@effector/router (core)'
        - '@effector/router-paths'
        - '@effector/router-react'
        - '@effector/router-react-native'
        - Not sure / multiple
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce, or a link to a minimal repro (StackBlitz/CodeSandbox/repo).
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Package version, effector version, Node.js version, framework version (React/RN), OS.
      placeholder: |
        - @effector/router: 1.0.0
        - effector: 23.x
        - node: 24.x
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Any relevant error output. Automatically formatted, no backticks needed.
      render: shell
    validations:
      required: false
