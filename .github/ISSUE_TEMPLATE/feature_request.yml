name: ✨ Feature request
description: Suggest a new feature or improvement.
title: '[Feature]: '
type: 'Feature'
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What are you trying to do that you can't today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the API or behaviour you'd like. Code examples are welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.
    validations:
      required: false
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package would this affect?
      options:
        - '@effector/router (core)'
        - '@effector/router-paths'
        - '@effector/router-react'
        - '@effector/router-react-native'
        - New package / not sure
    validations:
      required: true
